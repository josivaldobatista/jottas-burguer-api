version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: jottasburger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jottasburger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - jottasburger_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jottasburger"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jottasburger_postgres_data: