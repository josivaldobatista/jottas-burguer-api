<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Perfil - Jotta's Burger</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<header class="site-header">
    <div class="container header-row">
        <div>
            <h1 class="logo">Jotta's Burger</h1>
            <p class="header-user">
                Logado como <strong th:text="${user.name}">Usuário</strong>
            </p>
        </div>

        <nav class="main-nav">
            <a th:href="@{/home}">Home</a>
            <a th:href="@{/carrinho}">Carrinho</a>
            <a th:href="@{/perfil}">Perfil</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-button">Sair</button>
            </form>
        </nav>
    </div>
</header>

<main class="container">
    <section class="hero">
        <h2>Meu perfil</h2>
        <p>Informações da conta autenticada.</p>
    </section>

    <section class="info-grid">
        <article class="info-card">
            <h3>Nome</h3>
            <p th:text="${user.name}">Nome do usuário</p>
        </article>

        <article class="info-card">
            <h3>Email</h3>
            <p th:text="${user.email}">email@teste.com</p>
        </article>

        <article class="info-card">
            <h3>Role</h3>
            <p th:text="${user.role}">CUSTOMER</p>
        </article>

        <article class="info-card">
            <h3>Status</h3>
            <p th:text="${user.active ? 'Ativo' : 'Inativo'}">Ativo</p>
        </article>
    </section>
</main>

</body>
</html>
